services:
  sentinel:
    build: .
    container_name: sentinel
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8500}:8500"
    env_file:
      - .env
    volumes:
      - sentinel-data:/app/data
      - sentinel-workspace:/app/workspace
      - sentinel-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sentinel-data:
  sentinel-workspace:
  sentinel-logs:
